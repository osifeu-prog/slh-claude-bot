  # Telegram-native executor bot — @SLH_Claude_bot
  # Bridges Osif's phone to the SLH workspace via Anthropic Claude.
  claude-bot:
    build:
      context: ./slh-claude-bot
      dockerfile: Dockerfile
    container_name: slh-claude-bot
    restart: unless-stopped
    env_file:
      - ./slh-claude-bot/.env
    volumes:
      # Mount the entire ecosystem read/write so the bot can do git + file ops
      - ./:/workspace
      # Mount docker socket so /ps /bots /logs work from inside the container
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    # bot.py was COPY'd into /app by the Dockerfile; run it from there, but keep /workspace as cwd
    command: ["python", "/app/bot.py"]

  # @WEWORK_teamviwer_bot re-purposed as SLH Academy — real /buy flow + payments
  academia-bot:
    build:
      # Build from repo root so shared/ is in context. Dockerfile path is
      # relative to context. Updated 2026-04-26 for coord wiring.
      context: .
      dockerfile: academia-bot/Dockerfile
