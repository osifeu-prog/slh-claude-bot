      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-slh_secure_2026}@postgres:5432/slh_botshop
      WEBHOOK_URL: ""
      ADMIN_USER_ID: ${ADMIN_USER_ID:-224223270}
      COORDINATION_GROUP_CHAT_ID: ${COORDINATION_GROUP_CHAT_ID:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-slh_admin_2026}
