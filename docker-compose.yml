# ============================================================
# SLH ECOSYSTEM - Unified Docker Compose
# All Telegram bots + shared infrastructure
# SECURE MODE: use only external --env-file, do not rely on local .env
# ============================================================

services:

  # ---- SHARED INFRASTRUCTURE ----

  postgres:
    image: postgres:15-alpine
    container_name: slh-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-slh_secure_2026}
      POSTGRES_DB: slh_main
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: slh-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- BOT SERVICES ----

  core-bot:
    build:
      context: ../SLH_PROJECT_V2
      dockerfile: ../SLH_ECOSYSTEM/dockerfiles/Dockerfile.core
    container_name: slh-core-bot
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${CORE_BOT_TOKEN}
      BOT_USERNAME: ${CORE_BOT_USERNAME:-SLH_Academia_bot}
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-slh_secure_2026}@postgres:5432/slh_main
      REDIS_URL: redis://redis:6379/0
      REDIS_STREAM: slh:updates
      ADMIN_USER_ID: ${ADMIN_USER_ID:-224223270}
      COORDINATION_GROUP_CHAT_ID: ${COORDINATION_GROUP_CHAT_ID:-}
      ADMIN_ID: ${ADMIN_USER_ID:-224223270}
      MODE: polling
      ENV: prod
    volumes:
      - core-logs:/app/logs

  guardian-bot:
    build:
      context: ../telegram-guardian-DOCKER-COMPOSE-ENTERPRISE
      dockerfile: ../SLH_ECOSYSTEM/dockerfiles/Dockerfile.guardian
    container_name: slh-guardian-bot
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${GUARDIAN_BOT_TOKEN}
      TELEGRAM_TOKEN: ${GUARDIAN_BOT_TOKEN}
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-slh_secure_2026}@postgres:5432/slh_guardian
      REDIS_URL: redis://redis:6379/1
      ADMIN_CHAT_ID: ${ADMIN_USER_ID:-224223270}
      MODE: polling
      ENV: prod
    ports:
      - "8001:8080"

  botshop:
    build:
      context: ./botshop
      dockerfile: ../dockerfiles/Dockerfile.botshop
    container_name: slh-botshop
    restart: always
    depends_on:
      postgres:
