name: CI/CD Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r slh-claude-bot/requirements.txt
          pip install pytest flake8
      - name: Lint
        run: flake8 slh-claude-bot/ --count --max-complexity=10 --statistics
      - name: Build Docker
        run: docker build slh-claude-bot/ -t test-image
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Railway
        run: echo "Auto-deployed by Railway"
